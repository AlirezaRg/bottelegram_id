<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if success %}پرداخت موفق{% else %}پرداخت ناموفق{% endif %}</title>
<style>
    body { font-family: Tahoma, sans-serif; background:#16213e; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; padding:20px; box-sizing:border-box; }
    .card { background:#fff; border-radius:18px; max-width:380px; width:100%; padding:32px 24px; text-align:center; box-shadow:0 20px 50px rgba(0,0,0,.3); }
    .icon { font-size:48px; margin-bottom:12px; }
    h1 { font-size:20px; margin:0 0 8px; color:#1a202c; }
    p { color:#718096; font-size:14px; }
    .ref { margin-top:16px; font-size:13px; color:#a0aec0; }
</style>
</head>
<body>
    <div class="card">
        {% if success %}
            <div class="icon">✅</div>
            <h1>پرداخت با موفقیت انجام شد</h1>
            <p>{{ payment.get_purpose_display }} — {{ payment.amount_toman }} تومان</p>
            <div class="ref">کد پیگیری: {{ payment.gateway_ref_id }}</div>
        {% else %}
            <div class="icon">❌</div>
            <h1>پرداخت ناموفق بود</h1>
            <p>تراکنش لغو شد یا با خطا مواجه شد. می‌توانید از طریق ربات دوباره تلاش کنید.</p>
        {% endif %}
    </div>
</body>
</html>
