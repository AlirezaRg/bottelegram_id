<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ display_name }} - وضعیت تأیید</title>
<style>
    body {
        font-family: Tahoma, 'Vazirmatn', sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        box-sizing: border-box;
    }
    .card {
        background: #ffffff;
        border-radius: 18px;
        max-width: 420px;
        width: 100%;
        padding: 32px 28px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        text-align: center;
    }
    .avatar {
        width: 84px;
        height: 84px;
        border-radius: 50%;
        background: #eef1f7;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 34px;
        margin: 0 auto 16px;
        color: #4a5568;
    }
    .name { font-size: 22px; font-weight: 700; color: #1a202c; margin-bottom: 4px; }
    .username { color: #718096; font-size: 14px; margin-bottom: 20px; }

    .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 20px;
        border-radius: 999px;
        font-weight: 700;
        font-size: 15px;
        margin-bottom: 20px;
    }
    .badge.approved { background: #def7ec; color: #03543f; }
    .badge.pending { background: #feecdc; color: #9c4221; }
    .badge.rejected,.badge.not_submitted,.badge.revoked { background: #fde8e8; color: #9b1c1c; }

    .stats {
        display: flex;
        justify-content: space-around;
        border-top: 1px solid #edf2f7;
        padding-top: 18px;
        margin-top: 8px;
    }
    .stat-value { font-size: 20px; font-weight: 700; color: #2d3748; }
    .stat-label { font-size: 12px; color: #a0aec0; margin-top: 2px; }

    .footer { margin-top: 24px; font-size: 12px; color: #cbd5e0; }
</style>
</head>
<body>
    <div class="card">
        <div class="avatar">👤</div>
        <div class="name">{{ display_name }}</div>
        {% if username %}<div class="username">@{{ username }}</div>{% endif %}

        <div class="badge {{ status_code }}">
            <span>{{ status_icon }}</span>
            <span>{{ status_label }}</span>
        </div>

        <div class="stats">
            <div>
                <div class="stat-value">{{ trust_score }}</div>
                <div class="stat-label">امتیاز اعتماد</div>
            </div>
            <div>
                <div class="stat-value">{{ total_reports }}</div>
                <div class="stat-label">گزارش ثبت‌شده</div>
            </div>
        </div>

        <div class="footer">این صفحه به‌صورت خودکار از سیستم اعتمادسنجی تولید شده است.</div>
    </div>
</body>
</html>
